<body>
  <h1>Help</h1>
  <p>CLI equivalent: <code>pcf-inventory-extract &lt;org&gt; [-o file] [-d]</code></p>
  <ul>
    <li><strong>org</strong> — required CF org name</li>
    <li><strong>-o / output file</strong> — optional path for CSV; default
      <code>pcfusage_&lt;org&gt;_YYYYMMDDHHMMSS.csv</code> in the server process working directory</li>
    <li><strong>-d / debug</strong> — extra diagnostics to server stderr</li>
  </ul>
  <p><a href="/">Back</a></p>
</body>
