name: Python validate

on:
  push:
    branches: [main, next, "feat/*"]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - "tests/**"
      - ".github/workflows/python-validate.yml"
  pull_request:
    branches: [main, next]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - "tests/**"
      - ".github/workflows/python-validate.yml"
  workflow_dispatch:

jobs:
  ruff-pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Sync and test
        run: |
          uv sync --all-groups
          uv run ruff check src tests
          uv run pytest
