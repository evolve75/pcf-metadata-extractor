name: Shell Script Validation

on:
  push:
    branches: [main, next]
    paths:
      - '**/*.sh'
      - '.github/workflows/shell-validation.yml'
  pull_request:
    branches: [main, next]
    paths:
      - '**/*.sh'
      - '.github/workflows/shell-validation.yml'
  workflow_dispatch:

jobs:
  validate-shell-scripts:
    name: Validate Shell Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Find shell scripts
        id: find-scripts
        run: |
          scripts=$(find . -type f -name "*.sh" -not -path "./.git/*")
          echo "Found shell scripts:"
          echo "$scripts"
          echo "scripts<<EOF" >> $GITHUB_OUTPUT
          echo "$scripts" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Syntax validation (bash -n)
        env:
          SCRIPTS: ${{ steps.find-scripts.outputs.scripts }}
        run: |
          echo "=== Syntax Validation (bash -n) ==="
          all_passed=true
          while IFS= read -r script; do
            if [ -n "$script" ]; then
              echo "Checking: $script"
              if bash -n "$script" 2>&1; then
                echo "✓ Syntax valid: $script"
              else
                echo "✗ Syntax error: $script"
                all_passed=false
              fi
            fi
          done <<< "$SCRIPTS"

          if [ "$all_passed" = false ]; then
            echo "ERROR: Syntax validation failed"
            exit 1
          fi
          echo "All scripts passed syntax validation"

      - name: Shellcheck validation (standard)
        env:
          SCRIPTS: ${{ steps.find-scripts.outputs.scripts }}
        run: |
          echo "=== Shellcheck Validation (Standard) ==="
          all_passed=true
          while IFS= read -r script; do
            if [ -n "$script" ]; then
              echo "Checking: $script"
              if shellcheck "$script"; then
                echo "✓ Shellcheck passed: $script"
              else
                echo "✗ Shellcheck failed: $script"
                all_passed=false
              fi
            fi
          done <<< "$SCRIPTS"

          if [ "$all_passed" = false ]; then
            echo "ERROR: Shellcheck validation failed"
            exit 1
          fi
          echo "All scripts passed shellcheck validation"

      - name: Shellcheck validation (comprehensive --enable=all)
        env:
          SCRIPTS: ${{ steps.find-scripts.outputs.scripts }}
        run: |
          echo "=== Shellcheck Validation (Comprehensive --enable=all) ==="
          all_passed=true
          while IFS= read -r script; do
            if [ -n "$script" ]; then
              echo "Checking: $script"
              # Run shellcheck with --enable=all and capture output
              output=$(shellcheck --enable=all "$script" 2>&1) || true

              # Check if output contains errors or warnings (not just info)
              if echo "$output" | grep -qE "SC[0-9]+ \((error|warning)\)"; then
                echo "✗ Shellcheck comprehensive failed: $script"
                echo "$output"
                all_passed=false
              else
                echo "✓ Shellcheck comprehensive passed: $script"
                if [ -n "$output" ]; then
                  echo "  Info/style findings (allowed):"
                  echo "$output" | sed 's/^/  /'
                fi
              fi
            fi
          done <<< "$SCRIPTS"

          if [ "$all_passed" = false ]; then
            echo "ERROR: Shellcheck comprehensive validation failed (errors/warnings found)"
            exit 1
          fi
          echo "All scripts passed comprehensive shellcheck validation"

      - name: Summary
        if: always()
        run: |
          echo "=== Validation Summary ==="
          echo "Shell script validation workflow completed"
          echo "See job logs above for detailed results"
